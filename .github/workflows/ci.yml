# Swartz Center for Computational Neuroscience (SCCN),
# Institute for Neural Computation (INC), UC San Diego.
#
# ---------------------------------------------------------------------------
# WHAT A GREEN CHECK HERE MEANS
# ---------------------------------------------------------------------------
# ITK is built STATIC and module-pruned (tools/build_itk.sh), then linked in.
# This is not an optimisation, it is what makes the artifact real:
#
#   - A MEX linked against a package-manager ITK records absolute paths to the
#     build machine's ITK. On macOS that was 22 references into
#     /opt/homebrew/opt/itk/lib; on Linux the same mistake showed up at MEX load
#     as "libitkNetlibSlatec-5.4.so.1: cannot open shared object file".
#   - Both look fine on the runner that built them. A build-and-test-on-the-same-
#     runner job therefore proves nothing about redistributability, because the
#     toolchain is still sitting right there.
#
# So there are two jobs, and both must pass:
#   build    - builds static ITK + the MEX, runs tools/check_redistributable.sh
#              (inspects what is *recorded* in the binary), runs the suite.
#   verify   - downloads the artifact onto a FRESH runner that never installed
#              ITK, and runs the same suite. This is the half that actually
#              proves a downloader can use the file.
#
# Pruning is also a correctness requirement, not a size win: resolving ITK
# without an explicit module list pulls in ITKVtkGlue, and VTK's static
# destructors crash MATLAB on exit even when the filter returned correct output.
#
# MATLAB licensing: free and automatic only when (a) the repo is public AND
# (b) MATLAB is launched through matlab-actions' own wrappers (run-command /
# run-tests), NOT a bare `matlab -batch` or ctest -- the free licensing is
# implemented inside those actions. This repo is public, so tests run. On a
# private fork they will skip loudly unless MLM_LICENSE_TOKEN is set.
# Building needs no license: matlab_add_mex() compiles against MATLAB's shipped
# headers and never launches MATLAB.
# ---------------------------------------------------------------------------

name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  # Pinned deliberately. "latest" would let MathWorks silently change the
  # toolchain mexitk is graded against.
  MATLAB_RELEASE: R2025b
  # Must match the version tools/build_itk.sh defaults to, and the floor in
  # CMakeLists.txt's find_package(ITK 5.4 ...).
  ITK_VERSION: 5.4.6

jobs:
  build:
    name: Build + test (${{ matrix.label }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        include:
          # Pinned rather than -latest: all of macos-14/15/26 are arm64 today,
          # but -latest rolls forward on GitHub's schedule and would land a
          # toolchain/cache surprise on an unrelated PR.
          - os: macos-15
            label: macOS arm64
            mex: mexitk.mexmaca64
            artifact: mexitk-macos-arm64
          - os: ubuntu-latest
            label: Linux x86_64
            mex: mexitk.mexa64
            artifact: mexitk-ubuntu-x86_64
    env:
      MLM_LICENSE_TOKEN: ${{ secrets.MLM_LICENSE_TOKEN }}
      ITK_PREFIX: ${{ github.workspace }}/../itk-prefix
    steps:
      - uses: actions/checkout@v7

      - name: Record compiler version for the cache key
        id: cxx
        # A statically linked C++17 dependency graph is ABI-sensitive to the
        # compiler, so a cached ITK built by a different compiler is not safe to
        # reuse.
        run: echo "value=$(c++ --version | head -1 | tr -cd '[:alnum:].' )" >> "$GITHUB_OUTPUT"

      - name: Cache static ITK
        id: itk-cache
        uses: actions/cache@v6
        with:
          path: ${{ env.ITK_PREFIX }}
          # The module list is part of the key via the hash of build_itk.sh,
          # which owns that list. Change the modules, change the script, get a
          # new cache. That is deliberately better than a hand-maintained
          # literal that silently goes stale.
          key: itk-static-${{ matrix.os }}-${{ env.ITK_VERSION }}-${{ hashFiles('tools/build_itk.sh') }}-${{ steps.cxx.outputs.value }}

      - name: Build static ITK
        if: steps.itk-cache.outputs.cache-hit != 'true'
        # Measured at ~80s on a 12-core M4 Pro for the pruned module set;
        # expect several minutes on a runner with fewer cores. Cached after the
        # first run.
        env:
          ITK_BUILD_WORKDIR: ${{ runner.temp }}/itk-work
        run: ./tools/build_itk.sh "$ITK_PREFIX" "$ITK_VERSION"

      - name: Set up MATLAB
        id: setup-matlab
        uses: matlab-actions/setup-matlab@v3
        with:
          release: ${{ env.MATLAB_RELEASE }}
          cache: true

      - name: Configure
        env:
          # Feeds CMakeLists.txt's MATLAB_ROOT_DIR fallback: setup-matlab
          # installs MATLAB where FindMatlab's default search will not look.
          MATLAB_ROOT_DIR: ${{ steps.setup-matlab.outputs.matlabroot }}
        run: |
          cmake -S . -B build \
            -DCMAKE_BUILD_TYPE=Release \
            -DITK_DIR="$ITK_PREFIX/lib/cmake/ITK-5.4"

      - name: Build
        run: cmake --build build -j

      - name: Check the MEX is redistributable
        # Fails if ITK is still a runtime dependency or a build-time prefix got
        # baked in. Verified to reject a Homebrew-linked MEX and accept a
        # static one.
        run: ./tools/check_redistributable.sh "matlab/${{ matrix.mex }}"

      - name: Upload built MEX
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact }}
          path: matlab/${{ matrix.mex }}
          if-no-files-found: error

      - name: Determine MATLAB license availability
        id: matlab-license
        run: |
          if [ "${{ github.event.repository.private }}" = "true" ] && [ -z "$MLM_LICENSE_TOKEN" ]; then
            echo "available=false" >> "$GITHUB_OUTPUT"
          else
            echo "available=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Warn if MATLAB tests are being skipped
        if: steps.matlab-license.outputs.available == 'false'
        run: |
          echo "::warning::Skipping the mexitk test suite: this repository is private and no MLM_LICENSE_TOKEN secret is set, so matlab-actions cannot license MATLAB. The MEX was built but NOT test-verified in this run."

      - name: Run mexitk test suite
        if: steps.matlab-license.outputs.available == 'true'
        uses: matlab-actions/run-command@v3
        with:
          # run-command rather than `matlab -batch`/ctest: the free public-repo
          # licensing lives inside this action. run_mexitk_tests returns the
          # failure count; assert is the documented way to fail the step.
          command: >-
            addpath('matlab');
            assert(run_mexitk_tests('.') == 0,
            'mexitk test suite reported one or more failures; see log above.')

  verify-clean-runner:
    # The point of this job: this runner never installs ITK. If the downloaded
    # MEX loads and passes here, a user who downloads it can use it. That claim
    # cannot be made by the build job, which has ITK sitting on disk.
    name: Verify on clean runner, no ITK (${{ matrix.label }})
    needs: build
    # `needs: build` waits on every matrix leg, so without always() one platform
    # failing to build silently skips verification for the platform that
    # succeeded -- hiding a real result behind an unrelated failure. Each leg
    # here stands or falls on its own artifact; a leg whose build failed will
    # fail at download, which is honest rather than invisible.
    if: always()
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-15
            label: macOS arm64
            mex: mexitk.mexmaca64
            artifact: mexitk-macos-arm64
          - os: ubuntu-latest
            label: Linux x86_64
            mex: mexitk.mexa64
            artifact: mexitk-ubuntu-x86_64
    env:
      MLM_LICENSE_TOKEN: ${{ secrets.MLM_LICENSE_TOKEN }}
    steps:
      # Checked out for the test suite and fixtures only. Nothing is built here
      # and ITK is never installed; adding either would defeat the job.
      - uses: actions/checkout@v7

      - name: Download the built MEX
        uses: actions/download-artifact@v7
        with:
          name: ${{ matrix.artifact }}
          path: matlab

      - name: Confirm no ITK is present on this runner
        run: |
          echo "--- searching for any ITK install ---"
          found=0
          for p in /opt/homebrew/opt/itk /usr/local/opt/itk /usr/include/ITK-5.4 /usr/local/include/ITK-5.4; do
            if [ -e "$p" ]; then echo "UNEXPECTED: $p exists"; found=1; fi
          done
          if [ "$found" = "1" ]; then
            echo "::error::This runner has ITK installed, so it cannot prove the MEX is self-contained."
            exit 1
          fi
          echo "No ITK on this runner. Loading the MEX here is a real test."
          chmod +x "matlab/${{ matrix.mex }}" || true

      - name: Re-check the downloaded artifact
        run: ./tools/check_redistributable.sh "matlab/${{ matrix.mex }}"

      - name: Set up MATLAB
        uses: matlab-actions/setup-matlab@v3
        with:
          release: ${{ env.MATLAB_RELEASE }}
          cache: true

      - name: Determine MATLAB license availability
        id: matlab-license
        run: |
          if [ "${{ github.event.repository.private }}" = "true" ] && [ -z "$MLM_LICENSE_TOKEN" ]; then
            echo "available=false" >> "$GITHUB_OUTPUT"
          else
            echo "available=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Warn if the clean-runner check is being skipped
        if: steps.matlab-license.outputs.available == 'false'
        run: |
          echo "::warning::Cannot license MATLAB, so the downloaded MEX was inspected but never loaded. Redistributability is NOT verified in this run."

      - name: Load the MEX and run the suite with no ITK installed
        if: steps.matlab-license.outputs.available == 'true'
        uses: matlab-actions/run-command@v3
        with:
          command: >-
            addpath('matlab');
            assert(run_mexitk_tests('.') == 0,
            'The downloaded MEX failed on a runner with no ITK installed.')

  windows-placeholder:
    # Best-effort target, explicitly allowed never to block. Disabled rather
    # than written-and-broken: how ITK 5.4+ gets onto a Windows runner was never
    # established here (vcpkg's port is the lead, never built), and the MSVC
    # link path for matlab_add_mex is untested. A job that is `if: false` costs
    # nothing and documents the gap; a job that fails every push trains people to
    # ignore red CI. Turn on only with a locally reproduced Windows build.
    name: "Windows (disabled -- unresolved toolchain, see workflow comments)"
    if: false
    runs-on: windows-latest
    steps:
      - run: echo "Windows CI is not implemented. See the comment block above this job."
